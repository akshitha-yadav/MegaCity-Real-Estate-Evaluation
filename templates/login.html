<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In — UrbanGCN</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060810;--s1:#0d1117;--border:rgba(255,255,255,0.07);--accent:#00d4ff;--text:#dde4f0;--muted:#5a6478}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
    body::after{content:'';position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
    .card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:52px 44px;width:100%;max-width:440px;position:relative;z-index:1}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px;margin-bottom:36px}
    .logo-ring{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
    h1{font-size:1.75rem;font-weight:700;margin-bottom:6px}
    .sub{color:var(--muted);font-size:0.9rem;margin-bottom:32px}
    .alert{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:20px;display:flex;gap:8px;align-items:flex-start}
    .field{margin-bottom:18px}
    label{display:block;font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:0.95rem;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--accent)}
    .btn{width:100%;background:var(--accent);border:none;color:#060810;padding:13px;border-radius:10px;font-size:0.95rem;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px}
    .btn:hover{background:#00b8d9;transform:translateY(-1px);box-shadow:0 10px 28px rgba(0,212,255,0.35)}
    .foot{text-align:center;margin-top:24px;font-size:0.87rem;color:var(--muted)}
    .foot a{color:var(--accent);text-decoration:none}
    .foot a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="card">
  <a href="/" class="logo"><div class="logo-ring"></div> UrbanGCN</a>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to access your GCN prediction dashboard</p>
  {% if error %}<div class="alert">⚠ {{ error }}</div>{% endif %}
  {% if messages %}{% for m in messages %}<div class="alert">⚠ {{ m }}</div>{% endfor %}{% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="field"><label>Username</label><input type="text" name="username" placeholder="Enter username" required autocomplete="username"></div>
    <div class="field"><label>Password</label><input type="password" name="password" placeholder="Enter password" required autocomplete="current-password"></div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <p class="foot">No account? <a href="/register/">Create one free</a></p>
</div>
</body>
</html>
